name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: aarch64-linux-android
            build_cli: false
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            build_cli: false
          - os: ubuntu-latest
            target: x86_64-linux-android
            build_cli: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build_cli: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build_cli: true
          - os: macos-14
            target: aarch64-apple-darwin
            build_cli: true
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Android cross-compilation tools
        if: contains(matrix.target, 'android')
        uses: taiki-e/setup-cross-toolchain-action@v1
        with:
          target: ${{ matrix.target }}

      - name: Build release artifacts
        shell: bash
        run: |
          if [[ "${{ matrix.build_cli }}" == "true" ]]; then
            cargo build --release --locked --target "${{ matrix.target }}"
          else
            cargo build --release --locked --lib --target "${{ matrix.target }}"
          fi

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          release_dir="target/${{ matrix.target }}/release"
          mkdir -p dist

          copy_asset() {
            local file="$1"
            if [ ! -f "$file" ]; then
              return
            fi

            local base
            base="$(basename "$file")"
            if [[ "$base" == *.* ]]; then
              local stem="${base%.*}"
              local ext="${base##*.}"
              cp "$file" "dist/${stem}-${{ matrix.target }}.${ext}"
            else
              cp "$file" "dist/${base}-${{ matrix.target }}"
            fi
          }

          for file in \
            "$release_dir/libcczuvpnproto.so" \
            "$release_dir/libcczuvpnproto.a" \
            "$release_dir/libcczuvpnproto.dylib" \
            "$release_dir/cczuvpnproto.dll" \
            "$release_dir/cczuvpnproto.lib" \
            "$release_dir/cczu-vpn-proto" \
            "$release_dir/cczu-vpn-proto.exe"
          do
            copy_asset "$file"
          done

          if [ -z "$(find dist -maxdepth 1 -type f -print -quit)" ]; then
            echo "No release assets were collected for ${{ matrix.target }}" >&2
            exit 1
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  generate-bindings:
    name: Generate UniFFI bindings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build Linux cdylib for bindings generation
        shell: bash
        run: cargo build --release --locked --lib --features bindgen --target x86_64-unknown-linux-gnu

      - name: Build uniffi-bindgen tool
        shell: bash
        run: cargo build --locked --features bindgen --bin uniffi-bindgen

      - name: Generate UniFFI bindings
        shell: bash
        run: |
          set -euo pipefail
          library_path="target/x86_64-unknown-linux-gnu/release/libcczuvpnproto.so"
          mkdir -p bindings dist

          for language in kotlin swift python ruby
          do
            output_dir="bindings/${language}"
            mkdir -p "$output_dir"
            target/debug/uniffi-bindgen generate -n -l "$language" -o "$output_dir" "$library_path"
            tar -C "$output_dir" -czf "dist/cczuvpnproto-bindings-${language}.tar.gz" .
          done

      - name: Upload bindings artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-bindings
          path: dist/cczuvpnproto-bindings-*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs:
      - build
      - generate-bindings
    runs-on: ubuntu-latest
    steps:
      - name: Download built assets
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
